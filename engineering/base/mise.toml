[env]
API_PORT = "8000"
VITE_API_PORT = "{{env.API_PORT}}"

[tasks."deps:install:api"]
description = "Install api dependencies"
dir = "{{config_root}}/api"
run = "uv sync"

[tasks."deps:install:web"]
description = "Install web dependencies"
dir = "{{config_root}}/web"
run = "bun install"

[tasks."deps:install"]
description = "Install dependencies for api and web"
depends = ["deps:install:api", "deps:install:web"]

[tasks."api:dev"]
description = "Run the FastAPI dev server"
dir = "{{config_root}}/api"
run = "uv run fastapi dev --port $API_PORT"

[tasks."web:dev"]
description = "Run the Vite dev server"
dir = "{{config_root}}/web"
run = "bun run dev"
