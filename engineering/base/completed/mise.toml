[env]
API_PORT = "9001"
VITE_API_PORT = "{{env.API_PORT}}"

[tasks."api:deps:install"]
description = "Install api dependencies"
dir = "{{config_root}}/api"
run = "uv sync"

[tasks."api:dev"]
description = "Run the FastAPI dev server"
dir = "{{config_root}}/api"
run = "uv run fastapi dev --port $API_PORT"

[tasks."web:deps:install"]
description = "Install web dependencies"
dir = "{{config_root}}/web"
run = "bun install"

[tasks."web:dev"]
description = "Run the Vite dev server"
dir = "{{config_root}}/web"
run = "bun run dev"

[tasks."deps:install"]
description = "Install dependencies for api and web"
depends = ["api:deps:install", "web:deps:install"]

[tasks.dev]
description = "Run api and web dev servers in parallel"
depends = ["api:dev", "web:dev"]
